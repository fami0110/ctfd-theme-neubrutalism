{% if can_send_mail() %}
<div
    id="ctfdio-snackbar-email-nudge"
    x-data="{ dismissed: false }"
    x-show="!dismissed && window.init.userId && !window.init.userVerified && localStorage.getItem('remind_email_verify') != window.init.userId && (!['/team', '/teams/join', '/teams/new'].includes(window.location.pathname) || window.init.teamId != null)"
    class="alert alert-info alert-dismissible ctfdio-snackbar ctfdio-email-nudge"
    role="alert"
>
  <div class="ctfdio-snackbar-copy">
    <strong>{% trans %}Email unconfirmed{% endtrans %}</strong><br>
    <span>{% trans confirm_url=url_for('auth.confirm', flow='init') %}To confirm your email address, <a href="{{ confirm_url }}">click here</a>.{% endtrans %}</span>
  </div>
  <button type="button" class="btn-close" @click="localStorage.setItem('remind_email_verify', window.init.userId); dismissed = true;" aria-label="{% trans %}Close{% endtrans %}"></button>
</div>
{% endif %}
