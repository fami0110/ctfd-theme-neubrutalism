<div class="alert-stack">
  {% for info in infos %}
    <div class="alert alert-info alert-dismissible text-center" role="alert">
      <span class="alert-copy">{{ info }}</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="{% trans %}Close{% endtrans %}">
        <span aria-hidden="true"></span>
      </button>
    </div>
  {% endfor %}

  {% for error in errors %}
    <div class="alert alert-danger alert-dismissible text-center" role="alert">
      <span class="alert-copy">{{ error }}</span>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="{% trans %}Close{% endtrans %}">
        <span aria-hidden="true"></span>
      </button>
    </div>
  {% endfor %}
</div>
